<section class="contacto fade-up">

    <!-- ENCABEZADO -->
    <div class="contacto-header">
        <h1>Contáctanos</h1>
        <p>Estamos aquí para responder tus dudas y agendar tu cita. ¡Tu sonrisa es nuestra prioridad!</p>
    </div>

    <!-- FORMULARIO + INFO -->
    <div class="contacto-contenido">

        <!-- FORMULARIO -->
        <div class="contacto-form">
            <h2>Envíanos un mensaje</h2>

                <button type="submit">Enviar</button>
            </form>

            <!-- BOTÓN WHATSAPP -->
            <a class="whatsapp-btn" href="https://wa.me/tu_numero_aqui" target="_blank">
                <img src="assets/img/WhatsApp_icon.png" alt="WhatsApp"> Chatea con nosotros
            </a>
        </div>

        <!-- MAPA GOOGLE MAPS -->
