<div class="login-wrapper">
  <div class="login-card">
    
    <div class="login-header">
      <img src="assets/img/logo.png" alt="Logo Dental" class="logo">
      <h2>Bienvenido</h2>
      <p>Ingresa a tu cuenta para gestionar citas</p>
    </div>
    <a class="regresar" href="../../home"> ⬅️Regresar</a>

    <form [formGroup]="miFormulario" (ngSubmit)="alPresionarIngresar()" class="login-form">
      
      <div class="input-group">
        <input type="text" id="username" formControlName="username" required>
        <label for="username"><i class="fas fa-user"></i> Usuario o Email</label>
        <div class="bar"></div>
      </div>

      <div class="input-group">
        <input type="password" id="password" formControlName="password" required>
        <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
        <div class="bar"></div>
      </div>

      <div class="forgot-pass">
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>
      <div *ngIf="mensajeError" style="color: #dc2626; background-color: #fee2e2; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-weight: bold; font-size: 14px;">
        {{ mensajeError }}
      </div>
      <button type="submit" class="btn-login">
        Ingresar <i class="fas fa-arrow-right"></i>
      </button>

    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>
    </div>

  </div>
</div>
